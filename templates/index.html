<!DOCTYPE html>
<html>
<head>
    <title>Smart Captioner</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right,black,black);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
            width: 350px;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            background: black;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background: #007bff;
        }
    </style>

</head>

<body>

<div class="container">
    <h2>Upload Image</h2>

    <form action="/generate" method="POST" enctype="multipart/form-data">
        <input type="file" name="image" required><br>
        <button type="submit">Generate Caption</button>
    </form>
</div>

</body>
</html>
